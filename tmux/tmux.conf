# sensible default options (selective taken from https://github.com/tmux-plugins/tmux-sensible)
set  -s escape-time      0                 # Address vim mode switching delay (http://superuser.com/a/252717/65504)
set  -g history-limit    50000             # Increase scrollback buffer size from 2000 to 50000 lines
set  -g display-time     4000              # Increase tmux messages display duration from 750ms to 4s
set  -g status-interval  5                 # Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set  -g default-terminal "screen-256color" # Upgrade $TERM
set  -g status-keys      emacs             # Emacs key bindings in tmux command prompt (prefix + :) are better than vi keys, even for vim users
set  -g focus-events     on                # Focus events enabled for terminals that support them

# custom options (some taken from https://willhbr.net/2024/03/06/tmux-conf-with-commentary/)
set -g default-shell     "/opt/homebrew/bin/bash" # Use bash as default shell
set -g status-position   top                      # Show status bar at top
set -g base-index        1                        # Start window numbers by 1 instead of 0 to match the keyboards order
set -g renumber-windows  on                       # Change numbers when reordering windows to match the order
set -g set-titles        on                       # Propagate window title to terminal emulator
set -g set-titles-string "#W @ #S"                # Use 'Window title @ Session title'
set -g prefix            C-Space                  # Use Ctrl + Space as prefix
set -g mode-keys         vi                       # Use vi key bindings when in copy-mode
set -g mouse             off                      # Disable mouse
# TODO: Look at https://github.com/omerxx/dotfiles/blob/master/tmux/tmux.conf

# plugins
set -g @plugin "tmux-plugins/tpm"       # Use TPM (https://github.com/tmux-plugins/tpm) as plugin manager
set -g @plugin "catppuccin/tmux#v2.1.3" # Use catppuccin (https://github.com/catppuccin/tmux) as theme
# TODO: Look at https://github.com/tmux-plugins/tmux-sessionist
# TODO: Look at https://github.com/tmux-plugins/tmux-continuum
# TODO: Look at https://github.com/tmux-plugins/tmux-resurrect
# TODO: Look at https://github.com/fcsonline/tmux-thumbs
# TODO: Look at https://github.com/sainnhe/tmux-fzf

# theme
set -g  @catppuccin_flavor                 "macchiato"                         # Use macchiato flavor of catppuccin theme
set -g  @catppuccin_window_status_style    "rounded"                           # Use rounded tabs for windows
set -g  @catppuccin_window_number_position "right"                             # Show window number on the right within the tabs
set -g  @catppuccin_window_text            "#W"                                # Use current window title for inactive tabs
set -g  @catppuccin_window_current_text    "#W"                                # Use current window title for active tab
set -g  status-right-length                100                                 # Allow for 100 characters for the right status
set -g  status-right                       "#{E:@catppuccin_status_directory}" # Show current directory on the right
set -ga status-right                       "#{E:@catppuccin_status_session}"   # Show current session name on the right

# key bindings
unbind -T root      -aq
unbind -T prefix    -aq
unbind -T copy-mode -aq

bind    -N "Show all key bindings"                                               ?     list-keys -N
bind    -N "Reload tmux configuration"                                           r     source-file ~/.tmux.conf
bind    -N "Open command prompt"                                                 :     command-prompt
bind -n -N "Switch into copy-mode"                                               C-k   copy-mode
bind    -N "Detach from tmux"                                                    q     detach-client
bind    -N "Rename current session"                                              $     command-prompt -I "#S" { rename-session "%%" }
bind    -N "Kill current session"                                                Q     confirm-before -p "kill-session #S? (y/n)" kill-session
bind    -N "Select session, starting from 1"                                     T     choose-tree -s -Z -K "#{?#{e|<:#{line},9},#{e|+:#{line},1},#{?#{e|<:#{line},36},M-#{a:#{e|+:97,#{e|-:#{line},10}}},}}" # See https://www.reddit.com/r/tmux/comments/fsuy7e/comment/lz6rnpu/
bind    -N "Open new window at current path"                                     t     new-window -c '#{pane_current_path}' -a -t "{next}"
bind -n -N "Open new window at current path"                                     C-t   new-window -c '#{pane_current_path}' -a -t "{next}"
bind    -N "Rename current window"                                               ,     command-prompt -I "#W" { rename-window "%%" }
bind    -N "Kill current window"                                                 W     confirm-before -p "kill-window #W? (y/n)" kill-window
bind -r -N "Goto previous window (can be repeated)"                              "{"   previous-window
bind -r -N "Goto next window (can be repeated)"                                  "}"   next-window
bind -r -N "Goto last window (can be repeated)"                                  -     last-window
bind    -N "Goto 1st window"                                                     1     select-window -t :=1
bind    -N "Goto 2nd window"                                                     2     select-window -t :=2
bind    -N "Goto 3rd window"                                                     3     select-window -t :=3
bind    -N "Goto 4th window"                                                     4     select-window -t :=4
bind    -N "Goto 5th window"                                                     5     select-window -t :=5
bind    -N "Goto 6th window"                                                     6     select-window -t :=6
bind    -N "Goto 7th window"                                                     7     select-window -t :=7
bind    -N "Goto 8th window"                                                     8     select-window -t :=8
bind    -N "Goto 9th window"                                                     9     select-window -t :=9
bind    -N "Goto 10th window"                                                    0     select-window -t :=10
bind -r -N "Move current window to the left (can be repeated)"                   "<"   swap-window -d -t "{previous}"
bind -r -N "Move current window to the right (can be repeated)"                  ">"   swap-window -d -t "{next}"
bind -r -N "Split current pane into left and right (can be repeated)"            d     split-window -h  -c "#{pane_current_path}"
bind -r -N "Split current pane into top and bottom (can be repeated)"            D     split-window -v  -c "#{pane_current_path}"
bind -r -N "Split current pane full width into left and right (can be repeated)" f     split-window -fh -c "#{pane_current_path}"
bind -r -N "Split current pane full width into top and bottom (can be repeated)" F     split-window -fv -c "#{pane_current_path}"
bind -r -N "Rotate available layouts within current window (can be repeated)"    "#"   next-layout
bind -r -N "Rotate panes within current window (can be repeated)"                Tab   rotate-window
bind    -N "Kill current pane"                                                   w     confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind -r -N "Toggle zoom of current pane (can be repeated)"                       Space resize-pane -Z
bind -r -N "Resize current pane 5 cells to the left (can be repeated)"           H     resize-pane -L 5
bind -r -N "Resize current pane 5 cells to the bottom (can be repeated)"         J     resize-pane -D 5
bind -r -N "Resize current pane 5 cells to the top (can be repeated)"            K     resize-pane -U 5
bind -r -N "Resize current pane 5 cells to the right (can be repeated)"          L     resize-pane -R 5
bind -r -N "Goto left pane (can be repeated)"                                    h     select-pane -L
bind -r -N "Goto bottom pane (can be repeated)"                                  j     select-pane -D
bind -r -N "Goto top pane (can be repeated)"                                     k     select-pane -U
bind -r -N "Goto right pane (can be repeated)"                                   l     select-pane -R
bind -r -N "Goto previous pane (can be repeated)"                                "["   select-pane -t :.-
bind -r -N "Goto next pane (can be repeated)"                                    "]"   select-pane -t :.+
bind -r -N "Goto last pane (can be repeated)"                                    ";"   last-pane
bind    -N "Open current pane as new window (to the right) using !"              !     break-pane -a -t "{next}"
bind    -N "Start selection"           -T copy-mode-vi                           v     send-keys -X begin-selection
bind    -N "Copy selection"            -T copy-mode-vi                           y     send-keys -X copy-selection "pbcopy"
bind    -N "Copy selection and cancel" -T copy-mode-vi                           Y     send-keys -X copy-selection-and-cancel "pbcopy"
bind -n -N "Paste selection"                                                     C-p   paste-buffer -p

# Initialize plugin manager (keep this line at the very bottom of tmux.conf)
run "~/.tmux/plugins/tpm/tpm"
