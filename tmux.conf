# use login bash as default shell
set -g default-shell "/opt/homebrew/bin/bash"

# show status bar at top
set -g status-position top

# start window numbers by 1 instead of 0 to match the keyboards order
set -g base-index 1

# change numbers when reordering windows to match the order
set -g renumber-windows on

# enable mouse
set -g mouse on

# TODO: Maybe I should unbind everything and set up from scratch like https://willhbr.net/2024/03/06/tmux-conf-with-commentary/

# Use Ctrl + Space as prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Detach from tmux using q
unbind d
unbind q
bind q detach-client

# Use r to reloading the tmux configuration
unbind r
bind r source-file ~/.tmux.conf

# Use t to open a new window
unbind c
unbind t
bind t new-window -c '#{pane_current_path}' -a -t '{next}'

# Use Q to quit the current session
unbind Q
bind Q confirm-before -p "kill-session #S? (y/n)" kill-session

# Let sessions start at 1, too (see https://www.reddit.com/r/tmux/comments/fsuy7e/comment/lz6rnpu/)
unbind s
bind s choose-tree -s -Z -K "#{?#{e|<:#{line},9},#{e|+:#{line},1},#{?#{e|<:#{line},36},M-#{a:#{e|+:97,#{e|-:#{line},10}}},}}"

# Use iTerm movements to toggle through windows
unbind n
unbind p
unbind '{'
unbind '}'
bind -r '{' previous-window
bind -r '}' next-window

# Use W to close window
unbind &
bind W confirm-before -p "kill-window #W? (y/n)" kill-window

# Use iTerm mapping for splitting
unbind '%'
unbind '"'
unbind d
unbind D
bind -r d split-window -h
bind -r D split-window

# Use iTerm movements to toggle through panes
unbind o
unbind '['
unbind ']'
bind -r '[' select-pane -t :.-
bind -r ']' select-pane -t :.+

# Use vim movements for moving between panes
unbind Up
unbind Right
unbind Down
unbind Left
unbind h
unbind j
unbind k
unbind l
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Use w to close pane
unbind x
unbind w
bind w confirm-before -p "kill-pane #P? (y/n)" kill-pane

# Use TPM (https://github.com/tmux-plugins/tpm) as plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Use catppuccin theme with macchiato flavor
set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g  status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_session}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

