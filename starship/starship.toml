"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

palette = "catppuccin_macchiato"

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"

[aws]
disabled =true
format = '\[[$symbol($profile)(\($region\))(\[$duration\])]($style)\]'
symbol = "юМ╜ "

[character]
success_symbol = '[тЮЬ](green)(peach)'
error_symbol = '[тЮЬ](red)(peach)'

[cmd_duration]
format = '\[[тП▒ $duration]($style)\]'

[directory]
read_only = " ґ░М╛"
style = "bold lavender"
truncation_length = 4

[docker_context]
format = '\[[$symbol$context]($style)\]'
symbol = "яМИ "

[dotnet]
format = '\[[$symbol($version)(ЁЯОп $tfm)]($style)\]'

[git_branch]
format = '\[[$symbol$branch]($style)\]'
style = "bold mauve"
symbol = "яРШ "

[git_commit]
format = '\[[\($hash$tag\)]($style)\]'
tag_symbol = ' яРТ '

[git_metrics]
disabled = false
format = '\[[+$added]($added_style)\]\[[-$deleted]($deleted_style)\]'

[git_state]
format = '\[[$state ($progress_current/$progress_total)]($style)\]'

[git_status]
format = '([\[$all_status$ahead_behind\]]($style))'
ahead = 'тЗб${count}'
behind = 'тЗг${count}'
diverged = 'тЗХтЗб${ahead_count}тЗг${behind_count}'
up_to_date = 'тЬУ'

[golang]
format = '\[[$symbol($version)]($style)\]'
symbol = "юШз "

[gradle]
format = '\[[$symbol($version)]($style)\]'
symbol = "юЩа "

[helm]
format = '\[[$symbol($version)]($style)\]'

[hostname]
format = '\[[$ssh_symbol($hostname)]($style)\] '
ssh_symbol = "юмБ "

[java]
format = '\[[$symbol($version)]($style)\]'
symbol = "юЙЦ "

[jobs]
format = '\[[$symbol$number]($style)\]'

[kotlin]
format = '\[[$symbol($version)]($style)\]'
symbol = "юШ┤ "

[kubernetes]
disabled = true
format = '\[[$symbol$context( \($namespace\))]($style)\] '
detect_env_vars = ['K8S_ENABLED']

[lua]
format = '\[[$symbol($version)]($style)\]'
symbol = "юШа "

[nodejs]
format = '\[[$symbol($version)]($style)\]'
symbol = "юЬШ "

[package]
disabled = true
format = '\[[$symbol$version]($style)\]'
symbol = "ґ░ПЧ "

[ruby]
format = '\[[$symbol($version)]($style)\]'
symbol = "юЮС "

[scala]
format = '\[[$symbol($version)]($style)\]'
symbol = "юЬ╖ "

[shell]
format = '\[[$indicator]($style)\]'

[terraform]
format = '\[[$symbol$workspace]($style)\]'
