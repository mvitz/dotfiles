"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

[aws]
disabled =true
format = '\[[$symbol($profile)(\($region\))(\[$duration\])]($style)\]'
symbol = "ΌΝ╜ "

[character]
success_symbol = '[έηε](bold green)'
error_symbol = '[έηε](bold red) '

[cmd_duration]
format = '\[[έΠ▒ $duration]($style)\]'

[directory]
read_only = " ≤░Ν╛"

[docker_context]
format = '\[[$symbol$context]($style)\]'
symbol = "ΎΝΙ "

[dotnet]
format = '\[[$symbol($version)(ΏθΟψ $tfm)]($style)\]'

[git_branch]
format = '\[[$symbol$branch]($style)\]'
symbol = "ΎΡα "

[git_commit]
format = '\[[\($hash$tag\)]($style)\]'
tag_symbol = ' ΎΡΤ '

[git_metrics]
disabled = false
format = '\[[+$added]($added_style)\]\[[-$deleted]($deleted_style)\]'

[git_state]
format = '\[[$state ($progress_current/$progress_total)]($style)\]'

[git_status]
format = '([\[$all_status$ahead_behind\]]($style))'
ahead = 'έΘκ${count}'
behind = 'έΘμ${count}'
diverged = 'έΘΧέΘκ${ahead_count}έΘμ${behind_count}'
up_to_date = 'έεΥ'

[golang]
format = '\[[$symbol($version)]($style)\]'
symbol = "Όαπ "

[gradle]
format = '\[[$symbol($version)]($style)\]'
symbol = "Όβι "

[helm]
format = '\[[$symbol($version)]($style)\]'

[hostname]
format = '\[[$ssh_symbol($hostname)]($style)\] '
ssh_symbol = "ΌυΒ "

[java]
format = '\[[$symbol($version)]($style)\]'
symbol = "ΌΚΨ "

[jobs]
format = '\[[$symbol$number]($style)\]'

[kotlin]
format = '\[[$symbol($version)]($style)\]'
symbol = "Όα┤ "

[kubernetes]
disabled = true
format = '\[[$symbol$context( \($namespace\))]($style)\] '
detect_env_vars = ['K8S_ENABLED']

[lua]
format = '\[[$symbol($version)]($style)\]'
symbol = "Όαι "

[nodejs]
format = '\[[$symbol($version)]($style)\]'
symbol = "Όεα "

[package]
disabled = true
format = '\[[$symbol$version]($style)\]'
symbol = "≤░ΠΩ "

[ruby]
format = '\[[$symbol($version)]($style)\]'
symbol = "ΌηΣ "

[scala]
format = '\[[$symbol($version)]($style)\]'
symbol = "Όε╖ "

[shell]
format = '\[[$indicator]($style)\]'

[terraform]
format = '\[[$symbol$workspace]($style)\]'
