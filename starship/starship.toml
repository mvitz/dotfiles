"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

palette = "catppuccin_macchiato"

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"

[aws]
disabled =true
format = '\[[$symbol($profile)(\($region\))(\[$duration\])]($style)\]'
symbol = " "

[character]
success_symbol = '[➜](green)(peach)'
error_symbol = '[➜](red)(peach)'
#vimcmd_symbol = "[󰄛 ❮](subtext1)" # For use with zsh-vi-mode

[cmd_duration]
format = '\[[⏱ $duration]($style)\]'

[directory]
read_only = " 󰌾"
style = "bold lavender"
truncation_length = 4

[docker_context]
format = '\[[$symbol$context]($style)\]'
symbol = " "

[dotnet]
format = '\[[$symbol($version)(🎯 $tfm)]($style)\]'

[git_branch]
format = '\[[$symbol$branch]($style)\]'
style = "bold mauve"
symbol = " "

[git_commit]
format = '\[[\($hash$tag\)]($style)\]'
tag_symbol = '  '

[git_metrics]
disabled = false
format = '\[[+$added]($added_style)\]\[[-$deleted]($deleted_style)\]'

[git_state]
format = '\[[$state ($progress_current/$progress_total)]($style)\]'

[git_status]
format = '([\[$all_status$ahead_behind\]]($style))'
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
up_to_date = '✓'

[golang]
format = '\[[$symbol($version)]($style)\]'
symbol = " "

[gradle]
format = '\[[$symbol($version)]($style)\]'
symbol = " "

[helm]
format = '\[[$symbol($version)]($style)\]'

[hostname]
format = '\[[$ssh_symbol($hostname)]($style)\] '
ssh_symbol = " "

[java]
format = '\[[$symbol($version)]($style)\]'
symbol = " "

[jobs]
format = '\[[$symbol$number]($style)\]'

[kotlin]
format = '\[[$symbol($version)]($style)\]'
symbol = " "

[kubernetes]
disabled = true
format = '\[[$symbol$context( \($namespace\))]($style)\] '
detect_env_vars = ['K8S_ENABLED']

[lua]
format = '\[[$symbol($version)]($style)\]'
symbol = " "

[nodejs]
format = '\[[$symbol($version)]($style)\]'
symbol = " "

[package]
disabled = true
format = '\[[$symbol$version]($style)\]'
symbol = "󰏗 "

[ruby]
format = '\[[$symbol($version)]($style)\]'
symbol = " "

[scala]
format = '\[[$symbol($version)]($style)\]'
symbol = " "

[shell]
format = '\[[$indicator]($style)\]'

[terraform]
format = '\[[$symbol$workspace]($style)\]'
